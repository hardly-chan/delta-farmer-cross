name: ci

on: push

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Check dependency lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Verify lockfile was not changed
        run: git diff --exit-code -- pyproject.toml uv.lock

      - run: uv run --locked ruff format --check .
      - run: uv run --locked ruff check .
      - run: uv run --locked pyright
      - run: uv run --locked pytest -v

      - name: Verify generated changes are committed
        run: git diff --exit-code

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check pyproject.toml version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(grep '^version = ' pyproject.toml | cut -d'"' -f2)"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Error: tag ${TAG} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi

      - run: gh release create "${{ github.ref_name }}" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
